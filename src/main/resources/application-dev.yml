server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true

ai:
  openai:
    api-key: ${OPENAI_API_KEY:your-api-key-here}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: gpt-4
    temperature: 0.7
    max-tokens: 2000
    timeout: 60s

sa-token:
  token-name: Authorization
  timeout: 2592000
  activity-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true
  jwt-secret-key: your-jwt-secret-key-here

logging:
  level:
    root: INFO
    com.enterprise.ai: DEBUG
    dev.langchain4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
