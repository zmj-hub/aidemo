server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true

sa-token:
  token-name: Authorization
  timeout: 2592000
  activity-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: true
  jwt-secret-key: your-jwt-secret-key-here

logging:
  level:
    root: INFO
    com.enterprise.ai: DEBUG
    io.agentscope: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  charset:
    console: UTF-8
