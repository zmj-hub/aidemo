server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: ai-enterprise-platform
  profiles:
    active: dev

  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.enterprise.ai

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.enterprise.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  charset:
    console: UTF-8

# 模型配置
model:
  # ModelScope配置
  modelscope:
    enabled: false
    api-key: ms-28a9e148-b281-404d-a7bf-4b732cb1a61e
    base-url: https://api-inference.modelscope.cn/v1
    timeout: 60000
    max-retries: 3
    models:
      - Qwen/Qwen3.5-397B-A17B
      - Qwen/Qwen3.5-122B-A10B
      - qwen-plus
      - qwen2-7b-instruct
      - llama3-8b-instruct
  # Ollama配置
  ollama:
    enabled: false
    base-url: http://localhost:11434
    timeout: 60000
    max-retries: 3
    models:
      - llama2
      - llama3
      - mistral

# RAG配置
rag:
  # 文档存储路径
  document-storage-path: ./data/documents
  # 分块大小（字符数）
  chunk-size: 1000
  # 分块重叠大小（字符数）
  chunk-overlap: 200
  # 检索返回的最大文档数
  max-results: 5
  # 最小相似度阈值
  min-score: 0.7
  # 默认Embedding模型名称
  default-embedding-model: all-minilm-l6-v2
  # 默认Chat模型名称
  default-chat-model: qwen-turbo
  # 向量存储类型：memory-内存存储，milvus-Milvus向量数据库，pinecone-Pinecone向量数据库，chroma-Chroma向量数据库
  vector-store-type: memory
  # Milvus配置
  milvus:
    host: localhost
    port: 19530
    collection-name: rag_documents
    dimension: 384
  # Pinecone配置
  pinecone:
    api-key: ${PINECONE_API_KEY:}
    environment: ${PINECONE_ENVIRONMENT:}
    index-name: rag-documents
  # Chroma配置
  chroma:
    base-url: http://localhost:8000
    collection-name: rag_documents
