server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: ai-enterprise-platform
  profiles:
    active: dev

  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.enterprise.ai

knife4j:
  enable: true
  setting:
    language: zh_CN
  production: false
  basic:
    enable: false
  swagger-ui:
    enable: true
  openapi:
    title: 企业级AI智能体平台API文档
    description: 基于AgentScope框架的AI智能体平台，提供Agent对话、模型管理、RAG文档问答、会话管理等功能
    version: 2.0.0
    contact:
      name: 开发团队
      email: dev@enterprise.com
    license:
      name: Apache 2.0
      url: https://www.apache.org/licenses/LICENSE-2.0.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.enterprise.ai: DEBUG
    io.agentscope: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  charset:
    console: UTF-8

# ============================================================
# AgentScope 平台配置
# ============================================================
platform:
  # 模型配置（ModelScope OpenAI兼容接口）
  model:
    modelscope:
      enabled: true
      api-key: ms-28a9e148-b281-404d-a7bf-4b732cb1a61e
      base-url: https://api-inference.modelscope.cn/v1
      timeout: 60000
      max-retries: 3
      models:
        - Qwen/Qwen3.5-397B-A17B
        - Qwen/Qwen3.5-122B-A10B
        - qwen-plus
        - qwen-turbo
        - qwen2-7b-instruct
        - llama3-8b-instruct

  # Agent工作空间配置
  workspace:
    path: ./.agentscope/workspace
    auto-init: true

  # Session持久化配置
  session:
    path: ./data/sessions

  # RAG配置
  rag:
    document-storage-path: ./data/documents
    chunk-size: 1000
    chunk-overlap: 200
    max-results: 5
    min-score: 0.7
    default-chat-model: qwen-turbo
